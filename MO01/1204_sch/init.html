<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スケジュール管理</title>
</head>

<body>
  <!-- ✅ 固定ラッパー（横スクロールしない・常に左端） -->
  <div id="calendar-header-wrapper">
    <div id="calendar-container-header">
      <button id="toggle-header" class="toggle-minimize">−</button>
      <span id="current-month"></span>
      <button id="prev-month">前の月</button>
      <button id="now-month">現在月</button>
      <button id="next-month">次の月</button>
      <button id="reload-page">更新</button>
      <button id="scroll-today">本日</button>
      <button id="scroll-top">先頭に戻る</button>
    </div>
  </div>

  <!-- ✅ 下部の進捗・カレンダー表示部分 -->
  <div id="loading-message" style="font-size: 14px; color: #555; margin-top: 8px; display: none;">
    🔄 データを読み込み中です...
  </div>

  <div id="progress-container" style="width: 100%; background-color: #eee; height: 8px; margin: 8px 0;">
    <div id="progress-bar" style="width: 0%; height: 100%; background-color: #4caf50; transition: width 0.3s;"></div>
  </div>

  <!-- ✅ 横スクロールできるカレンダー本体 -->
  <div id="calendar-scroll-container">
    <div id="calendar"></div>
  </div>
</body>

</html>
